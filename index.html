<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idiathub 3.0 - Исправленный</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Экран авторизации */
        #authScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: #1e1e1e; padding: 25px; border-radius: 8px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .auth-box h2 { text-align: center; color: #00ffcc; margin-bottom: 5px; }
        
        /* Верхняя панель */
        header { display: none; background: #1a1a1a; padding: 10px 15px; border-bottom: 1px solid #333; align-items: center; justify-content: space-between; font-size: 14px; }
        .user-badge { display: flex; align-items: center; gap: 8px; }
        .online-dot { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #00ffcc; }

        /* Контентные зоны */
        .content-container { flex: 1; overflow: hidden; position: relative; }
        .content-page { display: none; position: absolute; top:0; left:0; width:100%; height:100%; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .content-page.active { display: flex; flex-direction: column; }

        /* Карточки постов */
        .video-card { background: #1e1e1e; margin-bottom: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        video, iframe { width: 100%; aspect-ratio: 16/9; background: #000; border: none; display: block; }
        .img-preview { width: 100%; max-height: 350px; object-fit: contain; background: #151515; display: block; }
        .v-info { padding: 12px; border-bottom: 1px solid #333; }
        .v-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .v-author { font-size: 12px; color: #aaa; }
        
        /* Панель взаимодействия */
        .v-actions { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #252525; font-size: 13px; }
        .action-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .action-btn.liked { color: #00ffcc; }
        .delete-btn { color: #ff3333; background: none; border: none; cursor: pointer; font-size: 12px; }

        /* Комментарии */
        .comments-section { padding: 12px; background: #161616; display: flex; flex-direction: column; gap: 6px; }
        .comments-list { max-height: 110px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
        .comment-item { background: #222; padding: 5px 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .comment-input-block { display: flex; gap: 5px; margin-top: 4px; }

        /* Чат */
        #chatPage.active { display: flex; flex-direction: column; padding: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #1e1e1e; padding: 8px 12px; border-radius: 6px; max-width: 85%; align-self: flex-start; word-break: break-word; font-size: 14px; }
        .msg .msg-meta { font-weight: bold; margin-bottom: 3px; font-size: 12px; }
        #inputArea { display: flex; padding: 10px; gap: 8px; background: #1a1a1a; border-top: 1px solid #333; }
        
        /* Вкладка Профиль */
        .profile-card { background: #1e1e1e; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        .color-picker-group { display: flex; gap: 10px; align-items: center; }

        /* Навигация СНИЗУ */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 1px solid #333; height: 60px; z-index: 99; }
        .tab-btn { flex: 1; border: none; background: none; color: #888; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
        .tab-btn.active { color: #00ffcc; background: #222; }

        /* Инпуты и Кнопки */
        input, select { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; }
        .btn { padding: 10px 15px; border: none; background: #00ffcc; color: #121212; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .secondary-btn { background: none; color: #aaa; font-size: 12px; border: none; cursor: pointer; text-decoration: underline; }

        /* Модалки */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #202020; padding: 20px; border-radius: 8px; width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Список каналов */
        .channel-item { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Звук уведомления -->
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav" preload="auto"></audio>

    <!-- Авторизация -->
    <div id="authScreen">
        <div class="auth-box" id="loginForm">
            <h2>Вход в Idiathub</h2>
            <input type="text" id="loginUser" placeholder="Логин (Имя)">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="btn" onclick="authLogin()">Войти</button>
            <button class="secondary-btn" onclick="toggleAuthForms(true)">Регистрация</button>
        </div>
        
        <div class="auth-box" id="regForm" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="regUser" placeholder="Логин">
            <input type="password" id="regPass" placeholder="Пароль">
            <button class="btn" onclick="authRegister()">Создать аккаунт</button>
            <button class="secondary-btn" onclick="toggleAuthForms(false)">Назад ко входу</button>
        </div>
    </div>

    <!-- Верхняя инфо-панель -->
    <header id="mainHeader">
        <div class="user-badge"><span class="online-dot"></span> <b id="headerUsername">Гость</b></div>
        <div id="onlineCount" style="color:#aaa; font-size:12px;">В сети: --</div>
    </header>

    <!-- Основные страницы -->
    <div class="content-container">
        <!-- Лента -->
        <section id="feedPage" class="content-page">
            <button class="btn" style="align-self: flex-end; margin-bottom: 12px;" onclick="toggleModal('uploadModal', 'global')">+ Добавить пост в ленту</button>
            <div id="globalFeedGrid"></div>
        </section>

        <!-- Список каналов -->
        <section id="channelsPage" class="content-page">
            <h3 style="margin-bottom:15px;">Все каналы</h3>
            <div id="channelsList"></div>
        </section>

        <!-- Конкретный канал -->
        <section id="singleChannelPage" class="content-page">
            <button class="secondary-btn" style="align-self:flex-start; margin-bottom:15px;" onclick="switchTab('channels')">← Назад к каналам</button>
            <h2 id="channelViewTitle" style="color:#00ffcc; margin-bottom:2px;">Канал</h2>
            <p id="channelViewStatus" style="color:#aaa; font-size:13px; font-style:italic; margin-bottom:15px;"></p>
            <button class="btn" id="channelUploadBtn" style="align-self: flex-end; margin-bottom: 15px; display:none;" onclick="toggleModal('uploadModal', 'channel')">+ Загрузить на свой канал</button>
            <div id="channelFeedGrid"></div>
        </section>

        <!-- Чат -->
        <section id="chatPage" class="content-page">
            <div id="messages"></div>
            <div id="inputArea">
                <input type="text" id="msgInput" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="btn" onclick="sendMsg()">></button>
            </div>
        </section>

        <!-- Профиль -->
        <section id="profilePage" class="content-page">
            <div class="profile-card">
                <h3>Твой профиль</h3>
                <label>Статус:</label>
                <input type="text" id="statusInput" placeholder="Что делаешь?">
                <div class="color-picker-group">
                    <label>Цвет никнейма:</label>
                    <input type="color" id="colorInput" value="#ff3333">
                </div>
                <button class="btn" onclick="saveProfile()">Сохранить</button>
                <button class="btn" style="background:#ff3333; color:white; margin-top:20px;" onclick="logOut()">Выйти</button>
            </div>
        </section>
    </div>

    <!-- Навигация снизу -->
    <nav class="bottom-nav" id="mainNav">
        <button class="tab-btn active" onclick="switchTab('feed')">📱 Лента</button>
        <button class="tab-btn" onclick="switchTab('channels')">📺 Каналы</button>
        <button class="tab-btn" onclick="switchTab('chat')">💬 Чат</button>
        <button class="tab-btn" onclick="switchTab('profile')">⚙️ Профиль</button>
    </nav>

    <!-- Модалка загрузки -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTargetTitle">Новый пост</h3>
            <input type="text" id="vTitle" placeholder="Описание">
            <div style="border: 1px dashed #444; padding: 10px; border-radius: 6px; background: #1a1a1a;">
                <input type="file" id="vFile" accept="video/*,image/*" style="width:100%; background:none; border:none; padding:0;">
            </div>
            <div style="text-align: center; color: #888; font-size: 11px;">— ИЛИ —</div>
            <input type="text" id="vUrl" placeholder="Ссылка на YouTube или картинку">
            <div id="uploadStatus" style="text-align:center; color:#00ffcc; font-size:13px;"></div>
            <button class="btn" id="publishBtn" onclick="addPost()">Выложить</button>
            <button class="btn" style="background:#383838; color:white;" onclick="toggleModal('uploadModal')">Отмена</button>
        </div>
    </div>

    <script type="module">
        // Ловим любые скрытые ошибки, чтобы они всплывали на экране телефона
        window.onerror = function(msg, url, line) {
            alert("Ошибка: " + msg + "\nСтрока: " + line);
            return true;
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, remove, update, query, limitToLast, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Если у тебя ТОЛЬКО Датабаза без Auth-сервиса, этого конфига достаточно
        const firebaseConfig = {
            databaseURL: "ТВОЯ_ССЫЛКА_НА_DATABASE" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem('idiathub_user') || null;
        let currentUploadScope = 'global';
        let isInitialChatLoad = true;

        if (currentUser) enterApp();

        function enterApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('headerUsername').innerText = currentUser;
            
            setupPresence();
            setupProfileData();
            switchTab('feed');
            loadGlobalFeed();
            loadChannelsList();
            loadChat();
        }

        window.toggleAuthForms = (showReg) => {
            document.getElementById('loginForm').style.display = showReg ? 'none' : 'flex';
            document.getElementById('regForm').style.display = showReg ? 'flex' : 'none';
        };

        window.authRegister = async () => {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if(!user || !pass) return alert('Заполните поля!');
            if(/[.#$\[\]]/.test(user)) return alert('Имя содержит недопустимые знаки');

            const snapshot = await get(ref(db, 'users/' + user));
            if(snapshot.exists()) return alert('Имя уже занято!');

            await set(ref(db, 'users/' + user), { password: pass, status: "Всем привет!", chatColor: "#00ffcc" });
            currentUser = user;
            localStorage.setItem('idiathub_user', currentUser);
            enterApp();
        };

        window.authLogin = async () => {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!user || !pass) return alert('Введите данные!');

            const snapshot = await get(ref(db, 'users/' + user));
            if(snapshot.exists() && snapshot.val().password === pass) {
                currentUser = user;
                localStorage.setItem('idiathub_user', currentUser);
                enterApp();
            } else { alert('Неверный логин или пароль!'); }
        };

        window.logOut = () => {
            localStorage.removeItem('idiathub_user');
            location.reload();
        };

        function setupPresence() {
            const onlineRef = ref(db, 'online/' + currentUser);
            const connectedRef = ref(db, '.info/connected');
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    set(onlineRef, true);
                    onDisconnect(onlineRef).remove();
                }
            });
            onValue(ref(db, 'online'), (snap) => {
                document.getElementById('onlineCount').innerText = `В сети: ${snap.exists() ? Object.keys(snap.val()).length : 0}`;
            });
        }

        async function setupProfileData() {
            const snap = await get(ref(db, 'users/' + currentUser));
            if(snap.exists()) {
                document.getElementById('statusInput').value = snap.val().status || '';
                document.getElementById('colorInput').value = snap.val().chatColor || '#00ffcc';
            }
        }

        window.saveProfile = async () => {
            const status = document.getElementById('statusInput').value.trim();
            const color = document.getElementById('colorInput').value;
            await update(ref(db, `users/${currentUser}`), { status: status, chatColor: color });
            alert('Сохранено!');
        };

        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-page').forEach(page => page.classList.remove('active'));

            const btnMap = { 'feed': 0, 'channels': 1, 'chat': 2, 'profile': 3 };
            if(btnMap[tabName] !== undefined) document.querySelectorAll('.tab-btn')[btnMap[tabName]].classList.add('active');

            const pageElement = document.getElementById(`${tabName}Page`);
            if(pageElement) pageElement.classList.add('active');

            if (tabName === 'chat') {
                const msgs = document.getElementById('messages');
                msgs.scrollTop = msgs.scrollHeight;
                isInitialChatLoad = false;
            }
        };

        function createPostElement(id, post, databasePath) {
            let playerHtml = '';
            if (post.mediaType === 'image') {
                playerHtml = `<img src="${post.url}" class="img-preview" alt="photo" onclick="registerView('${databasePath}/${id}', ${post.views || 0})">`;
            } else if (post.mediaType === 'youtube') {
                playerHtml = `<iframe src="https://www.youtube.com/embed/${post.url.split('/').pop().split('v=').pop()}" allowfullscreen onclick="registerView('${databasePath}/${id}', ${post.views || 0})"></iframe>`;
            } else {
                playerHtml = `<video src="${post.url}" controls playsinline preload="metadata" onplay="registerView('${databasePath}/${id}', ${post.views || 0})"></video>`;
            }

            const likeCount = post.likes ? Object.keys(post.likes).length : 0;
            const hasLiked = post.likes && post.likes[currentUser] ? 'liked' : '';
            const isOwner = post.author === currentUser;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                ${playerHtml}
                <div class="v-info">
                    <div class="v-title">${post.title}</div>
                    <div class="v-author">От: <b>${post.author}</b></div>
                </div>
                <div class="v-actions">
                    <button class="action-btn ${hasLiked}" onclick="toggleLike('${databasePath}/${id}', ${hasLiked ? 'true' : 'false'})">❤️ <span>${likeCount}</span></button>
                    <span>👁️ ${post.views || 0} просмотров</span>
                    ${isOwner ? `<button class="delete-btn" onclick="deletePost('${databasePath}/${id}')">🗑️ Удалить</button>` : ''}
                </div>
                <div class="comments-section">
                    <div class="comments-list" id="comments-${id}">...</div>
                    <div class="comment-input-block">
                        <input type="text" id="comment-in-${id}" placeholder="Коммент...">
                        <button class="btn" style="padding:4px 10px;" onclick="sendComment('${id}', '${databasePath}', ${post.views || 0})">></button>
                    </div>
                </div>
            `;

            onValue(ref(db, `comments/${id}`), (snap) => {
                const container = document.getElementById(`comments-${id}`);
                if(!container) return;
                container.innerHTML = '';
                if(!snap.exists()) {
                    container.innerHTML = '<div style="color:#555; font-style:italic; font-size:12px;">Нет комментов</div>';
                    return;
                }
                snap.forEach(c => {
                    const val = c.val();
                    const cId = c.key;
                    const canDelete = val.author === currentUser || isOwner;
                    container.innerHTML += `
                        <div class="comment-item">
                            <span><b>${val.author}:</b> ${val.text}</span>
                            ${canDelete ? `<span style="color:#ff3333; cursor:pointer;" onclick="deleteComment('${id}', '${cId}')">❌</span>` : ''}
                        </div>`;
                });
            });

            return card;
        }

        window.registerView = (path, currentViews) => {
            update(ref(db, path), { views: currentViews + 1 });
        };

        window.toggleLike = (path, isLiked) => {
            const likeRef = ref(db, path + '/likes/' + currentUser);
            if(isLiked) remove(likeRef);
            else set(likeRef, true);
        };

        window.deletePost = async (path) => {
            if(confirm('Удалить пост?')) {
                const id = path.split('/').pop();
                await remove(ref(db, path));
                await remove(ref(db, `comments/${id}`));
            }
        };

        window.sendComment = async (id, databasePath, currentViews) => {
            const input = document.getElementById(`comment-in-${id}`);
            if(!input.value.trim()) return;
            await push(ref(db, `comments/${id}`), { author: currentUser, text: input.value.trim() });
            input.value = '';
            registerView(databasePath + '/' + id, currentViews);
        };

        window.deleteComment = async (postId, commentId) => {
            if(confirm('Удалить комментарий?')) {
                await remove(ref(db, `comments/${postId}/${commentId}`));
            }
        };

        function loadGlobalFeed() {
            onValue(ref(db, 'global_feed'), (snap) => {
                const grid = document.getElementById('globalFeedGrid');
                grid.innerHTML = '';
                if(!snap.exists()) {
                    grid.innerHTML = '<div style="text-align:center; padding:30px; color:#aaa;">Лента пуста</div>';
                    return;
                }
                Object.keys(snap.val()).reverse().forEach(id => {
                    grid.appendChild(createPostElement(id, snap.val()[id], 'global_feed'));
                });
            });
        }

        function loadChannelsList() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('channelsList');
                list.innerHTML = '';
                if(!snap.exists()) return;
                
                Object.keys(snap.val()).forEach(username => {
                    const uData = snap.val()[username];
                    const item = document.createElement('div');
                    item.className = 'channel-item';
                    item.innerHTML = `<div><b>Канал: ${username}</b><div style="font-size:12px; color:#aaa;">${uData.status || ''}</div></div><span>📺</span>`;
                    item.onclick = () => openChannel(username, uData.status);
                    list.appendChild(item);
                });
            });
        }

        function openChannel(username, status) {
            document.querySelectorAll('.content-page').forEach(page => page.classList.remove('active'));
            document.getElementById('singleChannelPage').classList.add('active');
            document.getElementById('channelViewTitle').innerText = `Канал: ${username}`;
            document.getElementById('channelViewStatus').innerText = status || '';
            
            document.getElementById('channelUploadBtn').style.display = username === currentUser ? 'block' : 'none';

            onValue(ref(db, `channels/${username}`), (snap) => {
                const grid = document.getElementById('channelFeedGrid');
                grid.innerHTML = '';
                if(!snap.exists()) {
                    grid.innerHTML = '<div style="text-align:center; padding:30px; color:#aaa;">Нет видео</div>';
                    return;
                }
                Object.keys(snap.val()).reverse().forEach(id => {
                    grid.appendChild(createPostElement(id, snap.val()[id], `channels/${username}`));
                });
            });
        }

        window.addPost = async () => {
            const title = document.getElementById('vTitle').value.trim();
            const fileInput = document.getElementById('vFile').files[0];
            const urlInput = document.getElementById('vUrl').value.trim();
            const statusDiv = document.getElementById('uploadStatus');
            const pubBtn = document.getElementById('publishBtn');

            if (!title) return alert('Укажите описание!');
            if (!fileInput && !urlInput) return alert('Выберите файл или вставьте ссылку!');

            pubBtn.disabled = true;
            statusDiv.innerText = 'Загрузка...';

            let finalUrl = urlInput;
            let type = 'link';

            if (fileInput) {
                if (fileInput.size > 2097152) {
                    pubBtn.disabled = false;
                    statusDiv.innerText = '';
                    return alert('Файл больше 2 МБ!');
                }
                type = fileInput.type.startsWith('image/') ? 'image' : 'video';
                finalUrl = await new Promise((res) => {
                    const reader = new FileReader();
                    reader.onload = () => res(reader.result);
                    reader.readAsDataURL(fileInput);
                });
            } else {
                if (urlInput.includes('youtu')) type = 'youtube';
                else if (/\.(jpeg|jpg|gif|png)$/i.test(urlInput)) type = 'image';
                else type = 'video';
            }

            const postData = { title, url: finalUrl, mediaType: type, author: currentUser, createdAt: Date.now(), views: 0 };
            
            try {
                if(currentUploadScope === 'global') {
                    await push(ref(db, 'global_feed'), postData);
                } else {
                    await push(ref(db, `channels/${currentUser}`), postData);
                }
                toggleModal('uploadModal');
                document.getElementById('vTitle').value = '';
                document.getElementById('vFile').value = '';
                document.getElementById('vUrl').value = '';
            } catch(e) { alert(e.message); }

            pubBtn.disabled = false;
            statusDiv.innerText = '';
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            
            const userSnap = await get(ref(db, 'users/' + currentUser));
            const userColor = userSnap.exists() ? (userSnap.val().chatColor || '#00ffcc') : '#00ffcc';

            push(ref(db, 'chat'), {
                name: currentUser,
                text: input.value.trim(),
                color: userColor,
                time: Date.now()
            });
            input.value = '';
        };

        function loadChat() {
            onValue(query(ref(db, 'chat'), limitToLast(30)), (snap) => {
                const msgs = document.getElementById('messages');
                msgs.innerHTML = '';
                if(!snap.exists()) return;

                snap.forEach(s => {
                    const d = s.val();
                    msgs.innerHTML += `
                        <div class="msg">
                            <div class="msg-meta" style="color:${d.color || '#00ffcc'};">● ${d.name}</div>
                            <div>${d.text}</div>
                        </div>`;
                });
                
                msgs.scrollTop = msgs.scrollHeight;

                if (!isInitialChatLoad && !document.getElementById('chatPage').classList.contains('active')) {
                    document.getElementById('notifSound').play().catch(()=>{});
                }
            });
        }

        window.toggleModal = (id, scope = 'global') => {
            currentUploadScope = scope;
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('modalTargetTitle').innerText = scope === 'global' ? 'Добавить в ленту' : 'Загрузить на свой канал';
            document.getElementById('uploadStatus').innerText = '';
        };
    </script>
</body>
</html>
