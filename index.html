<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiathub - Лента и Чат</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        /* Навигация (вкладки) */
        nav { display: flex; background: #202020; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #ff0000; border-bottom: 3px solid #ff0000; background: #1a1a1a; }

        /* Контентные зоны */
        .content-page { display: none; flex: 1; overflow-y: auto; padding: 15px; }
        .content-page.active { display: flex; flex-direction: column; }

        /* Лента видео */
        .video-card { background: #1e1e1e; margin-bottom: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        video, iframe { width: 100%; aspect-ratio: 16/9; background: #000; border: none; }
        .v-info { padding: 12px; font-weight: bold; font-size: 16px; }
        .add-video-btn { background: #ff0000; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 15px; align-self: flex-end; }

        /* Чат */
        #chatPage { display: none; }
        #chatPage.active { display: flex; flex-direction: column; height: calc(100vh - 52px); padding: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #1e1e1e; padding: 10px; border-radius: 6px; max-width: 85%; align-self: flex-start; word-break: break-word; }
        .msg span { color: #ff3333; font-weight: bold; display: block; margin-bottom: 3px; font-size: 13px; }
        
        #inputArea { display: flex; padding: 12px; gap: 8px; background: #202020; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-size: 14px; }
        .send-btn { padding: 0 20px; border: none; background: #ff0000; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Модалка добавления */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #202020; padding: 20px; border-radius: 8px; width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

    <!-- Вкладки сверху -->
    <nav>
        <button class="tab-btn active" onclick="switchTab('videos')">Видео</button>
        <button class="tab-btn" onclick="switchTab('chat')">Чат</button>
    </nav>

    <!-- СТРАНИЦА 1: ВИДЕО -->
    <section id="videosPage" class="content-page active">
        <button class="add-video-btn" onclick="toggleModal('uploadModal')">+ Добавить видео</button>
        <div id="videoGrid">
            <div style="text-align: center; color: #aaa; padding: 40px;">Загрузка роликов...</div>
        </div>
    </section>

    <!-- СТРАНИЦА 2: ЧАТ -->
    <section id="chatPage" class="content-page">
        <div id="messages"></div>
        <div id="inputArea">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">Отправить</button>
        </div>
    </section>

    <!-- Окно добавления ссылок -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Добавить видео</h3>
            <input type="text" id="vTitle" placeholder="Название видео">
            <input type="text" id="vUrl" placeholder="Ссылка на видео (YouTube / direct MP4)">
            <button class="send-btn" style="padding:10px;" onclick="addVideo()">Опубликовать</button>
            <button class="send-btn" style="background:#383838; padding:10px;" onclick="toggleModal('uploadModal')">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUYZ4EPbiqApxTfe_dEjQl5eCL3tb1lM4",
            authDomain: "fir-bd773.firebaseapp.com",
            databaseURL: "https://fir-bd773-default-rtdb.firebaseio.com",
            projectId: "fir-bd773",
            storageBucket: "fir-bd773.firebasestorage.app",
            messagingSenderId: "301271941690",
            appId: "1:301271941690:web:3bcb2a78e346060f866b03"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Переключение вкладок
        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-page').forEach(page => page.classList.remove('active'));

            if (tabName === 'videos') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('videosPage').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('chatPage').classList.add('active');
                // Скроллим чат вниз при открытии вкладки
                const msgs = document.getElementById('messages');
                msgs.scrollTop = msgs.scrollHeight;
            }
        };

        // --- ЛОГИКА ЧАТА ---
        window.sendMsg = () => {
            const input = document.getElementById('msgInput');
            if (input.value.trim() === '') return;
            
            push(ref(db, 'chat'), {
                name: "Гость",
                text: input.value,
                time: Date.now()
            });
            input.value = '';
        };

        onValue(query(ref(db, 'chat'), limitToLast(50)), (snap) => {
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            if (!snap.exists()) {
                msgs.innerHTML = '<div style="text-align:center; color:#aaa; padding:20px;">В чате пока пусто...</div>';
                return;
            }
            snap.forEach(s => {
                const d = s.val();
                msgs.innerHTML += `<div class="msg"><span>${d.name}</span>${d.text}</div>`;
            });
            msgs.scrollTop = msgs.scrollHeight;
        });

        // --- ЛОГИКА ВИДЕО ---
        window.addVideo = async () => {
            const title = document.getElementById('vTitle').value;
            const url = document.getElementById('vUrl').value;

            if (!title || !url) return alert('Заполните все поля!');

            try {
                await push(ref(db, 'videos'), {
                    title: title,
                    videoUrl: url,
                    createdAt: Date.now()
                });
                document.getElementById('vTitle').value = '';
                document.getElementById('vUrl').value = '';
                toggleModal('uploadModal');
            } catch (e) { alert(e.message); }
        };

        onValue(ref(db, 'videos'), (snapshot) => {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            if (!snapshot.exists()) {
                grid.innerHTML = '<div style="text-align: center; color: #aaa; padding: 40px;">Видео пока нет</div>';
                return;
            }

            const data = snapshot.val();
            const sortedVideos = Object.values(data).sort((a, b) => b.createdAt - a.createdAt);

            sortedVideos.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                let playerHtml = `<video src="${video.videoUrl}" controls playsinline preload="metadata"></video>`;
                
                // Проверка на ссылку YouTube
                if (video.videoUrl.includes('youtube.com') || video.videoUrl.includes('youtu.be')) {
                    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    let match = video.videoUrl.match(regExp);
                    if (match && match[2].length == 11) {
                        playerHtml = `<iframe src="https://www.youtube.com/embed/${match[2]}" allowfullscreen></iframe>`;
                    }
                }

                card.innerHTML = `${playerHtml}<div class="v-info">${video.title}</div>`;
                grid.appendChild(card);
            });
        });

        window.toggleModal = (id) => {
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>
</body>
</html>
