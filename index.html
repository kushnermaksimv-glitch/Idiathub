<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiahub - Без регистрации</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 60px; }
        header { background: #202020; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #ff0000; }
        .btn { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 15px; }
        .video-card { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-info { padding: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #202020; padding: 20px; border-radius: 8px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>LiteTube</h1>
        <button class="btn" onclick="toggleModal('uploadModal')">+ Видео</button>
    </header>

    <main class="video-grid" id="videoGrid">Загрузка...</main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Загрузка</h3>
            <input type="text" id="videoTitleInput" placeholder="Название" style="padding:10px;">
            <input type="file" id="videoFileInput" accept="video/*">
            <button class="btn" onclick="uploadVideoAsText()">Опубликовать</button>
            <button onclick="toggleModal('uploadModal')" style="background:none; border:none; color:#aaa; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUYZ4EPbiqApxTfe_dEjQl5eCL3tb1lM4",
            authDomain: "fir-bd773.firebaseapp.com",
            projectId: "fir-bd773",
            storageBucket: "fir-bd773.firebasestorage.app",
            messagingSenderId: "301271941690",
            appId: "1:301271941690:web:3bcb2a78e346060f866b03"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        window.uploadVideoAsText = async () => {
            const title = document.getElementById('videoTitleInput').value;
            const file = document.getElementById('videoFileInput').files[0];
            const reader = new FileReader();
            
            reader.onload = async () => {
                await addDoc(collection(db, "videos"), { title, videoUrl: reader.result, author: "Гость", createdAt: Date.now() });
                location.reload();
            };
            reader.readAsDataURL(file);
        };

        async function loadVideos() {
            const snap = await getDocs(query(collection(db, "videos"), orderBy("createdAt", "desc")));
            document.getElementById('videoGrid').innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                document.getElementById('videoGrid').innerHTML += `<div class="video-card"><video src="${d.videoUrl}" controls></video><div class="video-info">${d.title}</div></div>`;
            });
        }
        window.toggleModal = (id) => { document.getElementById(id).style.display = document.getElementById(id).style.display === 'flex' ? 'none' : 'flex'; };
        loadVideos();
    </script>
</body>
</html>
