<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiathub - Лента, Чат и Комменты</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        /* Экран авторизации */
        #authScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: #1e1e1e; padding: 25px; border-radius: 8px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .auth-box h2 { text-align: center; color: #ff0000; margin-bottom: 5px; }
        
        /* Навигация (вкладки) */
        nav { display: none; background: #202020; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #ff0000; border-bottom: 3px solid #ff0000; background: #1a1a1a; }

        /* Контентные зоны */
        .content-page { display: none; flex: 1; overflow-y: auto; padding: 15px; }
        .content-page.active { display: flex; flex-direction: column; }

        /* Лента видео и Блок комментариев */
        .video-card { background: #1e1e1e; margin-bottom: 25px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        video, iframe { width: 100%; aspect-ratio: 16/9; background: #000; border: none; }
        .v-info { padding: 12px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; }
        
        /* Комментарии внутри карточки видео */
        .comments-section { padding: 12px; background: #161616; display: flex; flex-direction: column; gap: 8px; }
        .comments-title { font-size: 13px; color: #aaa; font-weight: bold; }
        .comments-list { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .comment-item { background: #222; padding: 6px 10px; border-radius: 4px; }
        .comment-item b { color: #ff3333; }
        .comment-input-block { display: flex; gap: 5px; margin-top: 5px; }

        /* Чат */
        #chatPage.active { display: flex; flex-direction: column; height: calc(100vh - 52px); padding: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #1e1e1e; padding: 10px; border-radius: 6px; max-width: 85%; align-self: flex-start; word-break: break-word; font-size: 14px; }
        .msg span { color: #ff3333; font-weight: bold; display: block; margin-bottom: 3px; font-size: 12px; }
        
        /* Инпуты и Кнопки */
        #inputArea { display: flex; padding: 12px; gap: 8px; background: #202020; border-top: 1px solid #333; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; }
        .btn { padding: 10px 15px; border: none; background: #ff0000; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; }
        .secondary-btn { background: none; color: #aaa; font-size: 12px; border: none; cursor: pointer; text-decoration: underline; margin-top: 5px; }

        /* Модалка добавления видео */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #202020; padding: 20px; border-radius: 8px; width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА / РЕГИСТРАЦИИ -->
    <div id="authScreen">
        <div class="auth-box" id="loginForm">
            <h2>Вход в Idiathub</h2>
            <input type="text" id="loginUser" placeholder="Логин (Имя)">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="btn" onclick="authLogin()">Войти</button>
            <button class="secondary-btn" onclick="toggleAuthForms(true)">Создать аккаунт</button>
            <button class="secondary-btn" onclick="forgotPassword()">Забыл пароль?</button>
        </div>
        
        <div class="auth-box" id="regForm" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="regUser" placeholder="Придумайте Логин">
            <input type="password" id="regPass" placeholder="Придумайте Пароль">
            <input type="text" id="regSecret" placeholder="Секретное слово (для восстановления)">
            <button class="btn" onclick="authRegister()">Зарегистрироваться</button>
            <button class="secondary-btn" onclick="toggleAuthForms(false)">Уже есть аккаунт</button>
        </div>
    </div>

    <!-- Вкладки сверху (появляются после входа) -->
    <nav id="mainNav">
        <button class="tab-btn active" onclick="switchTab('videos')">Видео</button>
        <button class="tab-btn" onclick="switchTab('chat')">Чат</button>
    </nav>

    <!-- СТРАНИЦА 1: ВИДЕО -->
    <section id="videosPage" class="content-page">
        <button class="btn" style="align-self: flex-end; margin-bottom: 15px;" onclick="toggleModal('uploadModal')">+ Добавить видео</button>
        <div id="videoGrid"></div>
    </section>

    <!-- СТРАНИЦА 2: ЧАТ -->
    <section id="chatPage" class="content-page">
        <div id="messages"></div>
        <div id="inputArea">
            <input type="text" id="msgInput" placeholder="Сообщение в чат..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()">></button>
        </div>
    </section>

    <!-- Модалка добавления видео -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Добавить видео</h3>
            <input type="text" id="vTitle" placeholder="Название видео">
            <input type="text" id="vUrl" placeholder="Ссылка на видео (YouTube / direct MP4)">
            <button class="btn" onclick="addVideo()">Опубликовать</button>
            <button class="btn" style="background:#383838;" onclick="toggleModal('uploadModal')">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUYZ4EPbiqApxTfe_dEjQl5eCL3tb1lM4",
            authDomain: "fir-bd773.firebaseapp.com",
            databaseURL: "https://fir-bd773-default-rtdb.firebaseio.com",
            projectId: "fir-bd773",
            storageBucket: "fir-bd773.firebasestorage.app",
            messagingSenderId: "301271941690",
            appId: "1:301271941690:web:3bcb2a78e346060f866b03"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem('idiathub_user') || null;

        // Проверка авторизации при старте
        if (currentUser) {
            enterApp();
        }

        function enterApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('videosPage').classList.add('active');
            loadVideos();
            loadChat();
        }

        // Переключение экранов Вход/Регистрация
        window.toggleAuthForms = (showReg) => {
            document.getElementById('loginForm').style.display = showReg ? 'none' : 'flex';
            document.getElementById('regForm').style.display = showReg ? 'flex' : 'none';
        };

        // РЕГИСТРАЦИЯ
        window.authRegister = async () => {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const secret = document.getElementById('regSecret').value.trim();

            if(!user || !pass || !secret) return alert('Заполните все поля!');
            if(user.includes('.') || user.includes('#') || user.includes('$') || user.includes('[') || user.includes(']')) {
                return alert('Имя не должно содержать символы ., #, $, [, ]');
            }

            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);
            
            if(snapshot.exists()) {
                alert('Пользователь с таким именем уже существует!');
            } else {
                await set(userRef, { password: pass, secret: secret });
                currentUser = user;
                localStorage.setItem('idiathub_user', currentUser);
                enterApp();
            }
        };

        // ВХОД
        window.authLogin = async () => {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if(!user || !pass) return alert('Введите логин и пароль!');

            const snapshot = await get(ref(db, 'users/' + user));
            if(snapshot.exists() && snapshot.val().password === pass) {
                currentUser = user;
                localStorage.setItem('idiathub_user', currentUser);
                enterApp();
            } else {
                alert('Неверный логин или пароль!');
            }
        };

        // ЗАБЫЛ ПАРОЛЬ
        window.forgotPassword = async () => {
            const user = prompt('Введите ваш логин для восстановления:');
            if(!user) return;

            const snapshot = await get(ref(db, 'users/' + user));
            if(!snapshot.exists()) return alert('Пользователь не найден!');

            const secretCheck = prompt('Введите ваше секретное слово:');
            if(snapshot.val().secret === secretCheck) {
                alert(`Ваш пароль: ${snapshot.val().password}`);
            } else {
                alert('Неверное секретное слово!');
            }
        };

        // Переключение вкладок
        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-page').forEach(page => page.classList.remove('active'));

            if (tabName === 'videos') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('videosPage').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('chatPage').classList.add('active');
                const msgs = document.getElementById('messages');
                msgs.scrollTop = msgs.scrollHeight;
            }
        };

        // ЧАТ
        window.sendMsg = () => {
            const input = document.getElementById('msgInput');
            if (input.value.trim() === '') return;
            
            push(ref(db, 'chat'), {
                name: currentUser,
                text: input.value,
                time: Date.now()
            });
            input.value = '';
        };

        function loadChat() {
            onValue(query(ref(db, 'chat'), limitToLast(50)), (snap) => {
                const msgs = document.getElementById('messages');
                msgs.innerHTML = '';
                snap.forEach(s => {
                    const d = s.val();
                    msgs.innerHTML += `<div class="msg"><span>${d.name}</span>${d.text}</div>`;
                });
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        // ВИДЕО
        window.addVideo = async () => {
            const title = document.getElementById('vTitle').value;
            const url = document.getElementById('vUrl').value;
            if (!title || !url) return alert('Заполните поля!');

            await push(ref(db, 'videos'), { title, videoUrl: url, createdAt: Date.now() });
            toggleModal('uploadModal');
        };

        // КОММЕНТАРИИ
        window.sendComment = async (videoId) => {
            const input = document.getElementById(`input-${videoId}`);
            if(!input.value.trim()) return;

            await push(ref(db, `comments/${videoId}`), {
                author: currentUser,
                text: input.value.trim(),
                time: Date.now()
            });
            input.value = '';
        };

        function loadVideos() {
            onValue(ref(db, 'videos'), (snapshot) => {
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = '';
                
                if (!snapshot.exists()) {
                    grid.innerHTML = '<div style="text-align: center; color: #aaa; padding: 40px;">Видео пока нет</div>';
                    return;
                }

                const data = snapshot.val();
                // Получаем массив ключей и сортируем новые сверху
                const keys = Object.keys(data).reverse();

                keys.forEach((id) => {
                    const video = data[id];
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    let playerHtml = `<video src="${video.videoUrl}" controls playsinline preload="metadata"></video>`;
                    if (video.videoUrl.includes('youtube.com') || video.videoUrl.includes('youtu.be')) {
                        let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                        let match = video.videoUrl.match(regExp);
                        if (match && match[2].length == 11) {
                            playerHtml = `<iframe src="https://www.youtube.com/embed/${match[2]}" allowfullscreen></iframe>`;
                        }
                    }

                    card.innerHTML = `
                        ${playerHtml}
                        <div class="v-info">${video.title}</div>
                        <div class="comments-section">
                            <div class="comments-title">Комментарии:</div>
                            <div class="comments-list" id="list-${id}">Загрузка комментов...</div>
                            <div class="comment-input-block">
                                <input type="text" id="input-${id}" placeholder="Оставить комментарий...">
                                <button class="btn" style="padding:5px 12px; font-size:13px;" onclick="sendComment('${id}')">Отправить</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);

                    // Вешаем слушатель на комментарии конкретно этого видео
                    onValue(ref(db, `comments/${id}`), (cSnap) => {
                        const cList = document.getElementById(`list-${id}`);
                        cList.innerHTML = '';
                        if(!cSnap.exists()) {
                            cList.innerHTML = '<div style="color:#666; font-style:italic;">Нет комментариев. Будь первым!</div>';
                            return;
                        }
                        cSnap.forEach(child => {
                            const val = child.val();
                            cList.innerHTML += `<div class="comment-item"><b>${val.author}:</b> ${val.text}</div>`;
                        });
                        cList.scrollTop = cList.scrollHeight;
                    });
                });
            });
        }

        window.toggleModal = (id) => {
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>
</body>
</html>
